<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Microsoft Entra Agent ID: How Identity Works for AI Agents</title>
<meta name="description" content="An interactive visual reference for Microsoft Entra Agent ID: the hierarchical identity model and authentication flows that power AI agents in Microsoft Entra ID.">
<script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
<style>

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    color: #1a1a1a; line-height: 1.75; -webkit-font-smoothing: antialiased; background: #fff; font-size: 16px;
}
:root {
    --page-bg: #fff;
    --text: #1a1a1a;
    --text-secondary: #767676;
    --accent: #2a446f;
    --canvas-bg: #0a0e1a;
    --canvas-panel: #0f1424;
    --canvas-border: rgba(80,230,255,0.08);
    --canvas-text: rgba(255,255,255,0.9);
    --canvas-text-dim: rgba(255,255,255,0.5);
    --flow-bg: #0a0e1a;
    --flow-panel: #0f1424;
    --flow-border: #1e293b;
    --flow-text: #8896a8;
    --flow-text-bright: #e0e0e0;
    --flow-text-detail: #c0c8d4;
    --flow-btn-bg: #0d1321;
    --dedicated-bg: #0a0e1a;
    --dedicated-border: rgba(255,255,255,0.15);
    --dedicated-text: rgba(255,255,255,0.7);
    --dedicated-title: #fff;
    --sel-stroke: #50E6FF;
}
html[data-theme="light"] {
    --canvas-bg: #f0f4f8;
    --canvas-panel: #ffffff;
    --canvas-border: rgba(0,120,212,0.12);
    --canvas-text: rgba(0,0,0,0.85);
    --canvas-text-dim: rgba(0,0,0,0.4);
    --flow-bg: #f0f4f8;
    --flow-panel: #ffffff;
    --flow-border: #e0e4e8;
    --flow-text: #555;
    --flow-text-bright: #1a1a1a;
    --flow-text-detail: #333;
    --flow-btn-bg: #f5f7fa;
    --dedicated-bg: #f0f4f8;
    --dedicated-border: rgba(0,0,0,0.15);
    --dedicated-text: rgba(0,0,0,0.6);
    --dedicated-title: #1a1a1a;
    --sel-stroke: #0078D4;
}
.topbar { background: #000; position: sticky; top: 0; z-index: 100; padding: 8px 24px; display: flex; justify-content: flex-end; align-items: center; }
.topbar-link { display: inline-flex; align-items: center; gap: 8px; padding: 6px 16px; background: transparent; color: #fff !important; border: 1px solid #444; border-radius: 4px; font-size: 13px; font-weight: 600; text-decoration: none; }
.topbar-link:hover { background: #222; border-color: #666; text-decoration: none; }
.hero { background: linear-gradient(135deg, #1e304f 0%, #263e65 50%, #2a446f 100%); padding: 48px 24px 44px; color: #fff; }
.hero-inner { max-width: 720px; margin: 0 auto; }
.hero-label { font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; color: #8fabc8; margin-bottom: 16px; font-weight: 600; }
.hero h1 { font-size: 34px; font-weight: 600; line-height: 1.25; margin-bottom: 20px; }
.hero .meta { display: flex; align-items: center; gap: 12px; font-size: 14px; color: #b0c4de; }
.hero .meta-author { font-weight: 600; color: #fff; text-decoration: none; }
.hero .meta-author:hover { text-decoration: underline; }
.hero .meta-sep { color: #5a7a9e; }
.hero .meta-role { font-size: 13px; color: #8fabc8; margin-top: 0; display: inline-flex; align-items: center; gap: 6px; }
.hero .meta-role .ms-logo { width: 16px; height: 16px; vertical-align: middle; }

.article { max-width: 860px; margin: 0 auto; padding: 0 24px; }
.article h2 { font-size: 24px; font-weight: 600; color: #1a1a1a; margin: 36px 0 16px; }
.article h3 { font-size: 18px; font-weight: 600; color: #1a1a1a; margin: 28px 0 12px; }
.article p { margin-bottom: 16px; color: #1a1a1a; }
.article ul { margin: 0 0 16px 20px; padding: 0; }
.article li { font-size: inherit; line-height: 1.75; color: #1a1a1a; margin-bottom: 4px; }
.article a { color: #2a446f; text-decoration: none; }
.article a:hover { text-decoration: underline; }
.article strong { font-weight: 600; }
.article code { background: #f5f5f5; padding: 2px 6px; border-radius: 3px; font-size: 14px; font-family: 'Cascadia Code', Consolas, monospace; }

.disclaimer { background: #eef2f7; border-left: 3px solid #2a446f; padding: 16px 20px; margin: 20px 0; font-size: 15px; }
.disclaimer p { margin-bottom: 0; }
.note { background: #eef2f7; border-left: 3px solid #2a446f; padding: 16px 20px; margin: 20px 0; font-size: 16px; }
.note p { margin-bottom: 0; }

/* ── Section blocks ── */
.section-block { padding: 40px 0 32px; }
.section-block + .section-block { border-top: 1px solid #e5e5e5; }
.section-head { display: flex; align-items: baseline; gap: 14px; margin-bottom: 8px; }
.section-num { font-size: 24px; font-weight: 700; color: #0078D4; letter-spacing: 0.02em; font-variant-numeric: tabular-nums; }
.section-head h2 { font-size: 24px; font-weight: 600; color: #1a1a1a; margin: 0; }
.section-desc { font-size: 16px; color: #008272; margin-bottom: 24px; font-weight: 500; }

/* ── Section nav cards ── */
.section-nav-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin: 16px 0 8px; }
.section-nav-hero { margin: 28px 0 16px; }
.section-nav-card {
  position: relative; display: flex; align-items: flex-start; gap: 14px;
  padding: 20px 20px 20px 20px;
  background: #ffffff; border: 1px solid #e0e0e0; border-radius: 8px;
  cursor: pointer; text-decoration: none; color: inherit;
  transition: background .15s, border-color .15s, box-shadow .15s, transform .15s;
  overflow: hidden;
}
.section-nav-card::before {
  content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px;
  background: var(--card-accent); border-radius: 8px 8px 0 0;
}
.section-nav-card:hover {
  background: #f5f5f5; border-color: #c0c0c0;
  transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.08);
}
.section-nav-card:active { transform: translateY(0); box-shadow: none; }
.section-nav-card-icon {
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  width: 40px; height: 40px; border-radius: 8px;
  background: color-mix(in srgb, var(--card-accent) 10%, transparent);
}
.section-nav-card-icon iconify-icon { font-size: 22px; color: var(--card-accent); }
.section-nav-card-body { flex: 1; min-width: 0; }
.section-nav-card-num {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--card-accent); margin-bottom: 4px; line-height: 1;
}
.section-nav-card-title {
  font-size: 14px; font-weight: 600; color: #242424;
  line-height: 1.35; margin-bottom: 4px;
}
.section-nav-card-desc {
  font-size: 12.5px; color: #616161; line-height: 1.45; margin: 0;
}
.section-nav-card-arrow {
  flex-shrink: 0; align-self: center; color: #c0c0c0;
  transition: transform .15s, color .15s;
}
.section-nav-card:hover .section-nav-card-arrow { color: var(--card-accent); transform: translateX(3px); }

/* Hero card overrides */
.section-nav-hero .section-nav-card {
  background: linear-gradient(135deg, #f0f6ff 0%, #f9fbff 100%);
  border-color: color-mix(in srgb, var(--card-accent) 35%, transparent);
  padding: 24px 24px 24px 24px;
}
.section-nav-hero .section-nav-card::before { height: 4px; }
.section-nav-hero .section-nav-card-icon { width: 48px; height: 48px; border-radius: 10px; }
.section-nav-hero .section-nav-card-icon iconify-icon { font-size: 26px; }
.section-nav-hero .section-nav-card-title { font-size: 16px; }
.section-nav-hero .section-nav-card-desc { font-size: 13px; }
.section-nav-hero .section-nav-card:hover {
  background: linear-gradient(135deg, #e5efff 0%, #f0f6ff 100%);
  border-color: var(--card-accent);
}

/* ── Graph section (breaks out of article width) ── */
.graph-section { max-width: 1500px; margin: 28px auto; padding: 0 24px; transition: margin-left .3s ease; }
.graph-section.shifted { margin-left: 320px; }
.diagram-graph {
    background: var(--canvas-bg); border-radius: 12px; overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    flex: 1; min-width: 0;
}
.diagram-graph.has-detail { }
.graph-with-detail { display: flex; gap: 16px; align-items: stretch; position: relative; }
.graph-canvas-wrap { position: relative; overflow: hidden; width: 100%; }
.diagram-graph canvas { display: block; cursor: default; }
.graph-hint { position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%); font-size: 12px; color: var(--canvas-text-dim); pointer-events: none; font-family: 'Segoe UI', sans-serif; }

/* ── Detail side panel (outside graph) ── */
.graph-detail {
    width: 380px; flex-shrink: 0;
    background: var(--canvas-panel); border: 1px solid var(--canvas-border); border-radius: 12px;
    padding: 28px 24px; overflow-y: auto; box-sizing: border-box;
    animation: slideIn .3s ease; font-family: 'Segoe UI', sans-serif; color: var(--canvas-text);
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
}
.graph-detail h3 { font-size: 18px; font-weight: 600; color: var(--dedicated-title); margin-bottom: 4px; }
.graph-detail .gd-cat { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; padding: 2px 8px; border-radius: 100px; display: inline-block; margin-bottom: 12px; }
.graph-detail p { font-size: 14px; color: var(--dedicated-text); line-height: 1.65; margin-bottom: 12px; }
.graph-detail h4 { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--canvas-text-dim); margin: 12px 0 6px; }
.graph-detail ul { list-style: none; padding: 0; margin: 0 0 12px; }
.graph-detail li { font-size: 13px; color: var(--dedicated-text); padding: 3px 0 3px 14px; position: relative; }
.graph-detail li::before { content: ''; position: absolute; left: 0; top: 10px; width: 5px; height: 5px; border-radius: 50%; }
.graph-detail .gd-rel { font-size: 13px; color: var(--dedicated-text); padding: 2px 0; }
.graph-detail .gd-icon { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.gd-back { display: inline-flex; align-items: center; gap: 6px; background: none; border: 1px solid var(--canvas-border); color: var(--canvas-text-dim); cursor: pointer; font-size: 12px; padding: 5px 12px; border-radius: 4px; font-family: inherit; margin-bottom: 16px; transition: all .2s; }
.gd-back:hover { border-color: var(--sel-stroke); color: var(--sel-stroke); }
.gd-back iconify-icon { font-size: 14px; }

/* ── License panel (positioned left of graph) ── */
.license-panel {
    position: absolute; top: 0; right: 100%; margin-right: 16px; z-index: 50;
    width: 300px; max-height: 100%;
    background: var(--canvas-panel); border: 1px solid var(--canvas-border); border-radius: 12px;
    padding: 24px 20px; overflow-y: auto; box-sizing: border-box;
    animation: slideInLeft .3s ease; font-family: 'Segoe UI', sans-serif; color: var(--canvas-text);
    box-shadow: 0 4px 24px rgba(0,0,0,0.15);
}
.license-panel h3 { font-size: 15px; font-weight: 600; color: var(--dedicated-title); margin: 0 0 4px; display: flex; align-items: center; gap: 8px; }
.license-panel .lp-badge { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; padding: 2px 8px; border-radius: 100px; background: rgba(255,140,0,0.15); color: #FF8C00; }
.license-panel .lp-plan { margin-top: 16px; }
.license-panel .lp-plan-name { font-size: 13px; font-weight: 700; color: var(--dedicated-title); margin-bottom: 6px; }
.license-panel .lp-plan-note { font-size: 11px; font-weight: 600; color: #FF8C00; margin-top: 6px; padding: 4px 8px; border-radius: 6px; background: rgba(255,140,0,0.08); border-left: 2px solid #FF8C00; }
.license-panel .lp-plan-bundle { font-size: 11px; font-weight: 600; color: #50E6FF; margin-top: 4px; padding: 4px 8px; border-radius: 6px; background: rgba(80,230,255,0.08); border-left: 2px solid #50E6FF; }
.license-panel .lp-tool-header { display: flex; align-items: center; gap: 8px; margin-top: 16px; margin-bottom: 8px; padding: 8px 10px; border-radius: 8px; border: 1px solid var(--canvas-border); background: rgba(255,140,0,0.06); }
.license-panel .lp-tool-header iconify-icon { flex-shrink: 0; }
.license-panel .lp-tool-name { font-size: 13px; font-weight: 700; color: var(--dedicated-title); }
.license-panel .lp-connector { width: 2px; height: 12px; background: rgba(255,140,0,0.4); margin: 0 auto; border-radius: 1px; }
.license-panel ul { list-style: none; padding: 0; margin: 0; }
.license-panel li { font-size: 12px; color: var(--dedicated-text); padding: 3px 0 3px 16px; position: relative; line-height: 1.5; }
.license-panel li::before { content: '\2713'; position: absolute; left: 0; color: #4CAF50; font-size: 11px; font-weight: 700; }
@keyframes slideInLeft { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
/* ── Flow selector + diagram ── */
.flow-tabs { display: flex; gap: 8px; justify-content: flex-start; padding: 20px 20px 0; }
.flow-tab { padding: 9px 20px; border-radius: 6px; border: 1px solid var(--flow-border); background: var(--flow-btn-bg); color: var(--flow-text); cursor: pointer; font-size: 13px; font-family: inherit; font-weight: 500; transition: all .2s; }
.flow-tab:hover { border-color: #4da6ff; color: var(--flow-text-detail); }
.flow-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
.flow-diagram-wrap { background: var(--flow-bg); border-radius: 12px; overflow: hidden; }
.flow-body { display: flex; align-items: stretch; height: 480px; }
.flow-diagram-svg { flex: 1; min-width: 0; padding: 24px 12px 16px 16px; display: flex; align-items: flex-start; justify-content: center; overflow: hidden; }
.flow-diagram-svg svg { width: 100%; max-height: 100%; }
.flow-diagram-svg svg text { font-family: 'Segoe UI', system-ui, sans-serif; }
.flow-detail-panel { width: 320px; flex-shrink: 0; padding: 20px 24px; border-left: 1px solid var(--flow-border); background: var(--flow-panel); display: flex; flex-direction: column; overflow-y: auto; }
.fdp-summary { font-size: 12px; color: var(--flow-text); line-height: 1.5; padding-bottom: 12px; margin-bottom: 12px; border-bottom: 1px solid; }
.fdp-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.fdp-num { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0; }
.fdp-label { font-size: 14px; font-weight: 600; color: var(--flow-text-bright); }
.fdp-from { font-size: 11px; color: var(--flow-text); font-style: italic; margin-bottom: 8px; }
.fdp-detail { font-size: 12.5px; color: var(--flow-text-detail); line-height: 1.5; flex: 1; }
.fdp-nav { display: flex; gap: 8px; margin-top: 16px; }
.fdp-nav button { flex: 1; padding: 8px 14px; border-radius: 6px; border: 1px solid var(--flow-border); background: var(--flow-btn-bg); color: var(--flow-text); cursor: pointer; font-size: 12px; font-family: inherit; transition: all .2s; }
.fdp-nav button:hover:not(:disabled) { border-color: #4da6ff; color: #4da6ff; }
.fdp-nav button:disabled { opacity: .3; cursor: default; }

/* ── Governance section ── */
.gov-body { display: flex; height: 480px; }
.gov-nav { width: 220px; flex-shrink: 0; display: flex; flex-direction: column; gap: 2px; padding: 16px 12px; border-right: 1px solid var(--flow-border); overflow-y: auto; }
.gov-btn { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 6px; border: none; background: transparent; color: var(--flow-text); cursor: pointer; font-size: 14px; font-family: inherit; font-weight: 500; text-align: left; transition: all .2s; }
.gov-btn:hover { background: rgba(255,255,255,0.04); color: var(--flow-text-detail); }
.gov-btn.active { background: var(--accent); color: #fff; font-weight: 600; }
.gov-btn iconify-icon { font-size: 18px; flex-shrink: 0; }
.gov-detail { flex: 1; min-width: 0; padding: 16px 24px; overflow-y: auto; }
.gov-title { font-size: 20px; font-weight: 700; color: var(--flow-text-bright); margin-bottom: 4px; }
.gov-subtitle { font-size: 14px; color: var(--flow-text); margin-bottom: 10px; }
.gov-summary { font-size: 15px; color: var(--flow-text-detail); line-height: 1.55; margin-bottom: 10px; }
.gov-points { list-style: none; padding: 0; margin: 0; }
.gov-points li { font-size: 14px; color: var(--flow-text); line-height: 1.5; padding: 4px 0 4px 18px; position: relative; }
.gov-points li::before { content: '\25B8'; position: absolute; left: 0; color: var(--accent); font-size: 11px; }

/* ── Coming soon placeholder ── */
.coming-soon { background: #f5f5f5; border-radius: 12px; padding: 48px 32px; text-align: center; margin: 8px 0 0; }
.coming-soon iconify-icon { font-size: 36px; color: #b0b0b0; margin-bottom: 12px; display: block; }
.coming-soon h3 { font-size: 18px; font-weight: 600; color: #424242; margin-bottom: 8px; }
.coming-soon p { font-size: 14px; color: #767676; margin-bottom: 0; max-width: 420px; margin-left: auto; margin-right: auto; }

.concept-tag { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; background: #f5f5f5; border-radius: 3px; font-size: 13px; font-weight: 500; white-space: nowrap; }

.sources { border-top: 2px solid #0078D4; padding: 24px 0 0; margin: 32px 0 0; }
.sources h3 { font-size: 14px; font-weight: 600; color: #0078D4; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.sources > p { font-size: 13px; color: #616161; margin-bottom: 16px; }
.sources-grid { display: flex; flex-wrap: wrap; gap: 6px 24px; }
.sources-grid a { font-size: 12.5px; color: #0078D4; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; padding: 3px 0; transition: color .15s; }
.sources-grid a:hover { color: #005a9e; text-decoration: underline; }
.sources-grid a::after { content: '\2197'; font-size: 10px; opacity: 0.6; }
.sources .src-note { font-size: 11px; color: #999; margin-top: 14px; }

.footer { border-top: 1px solid #e5e5e5; padding: 20px 24px; text-align: center; font-size: 13px; color: #767676; }
.footer a { color: #2a446f; text-decoration: none; }
.footer a:hover { text-decoration: underline; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

/* ── Dedicated view mode ── */
.dedicated-view { min-height: 100vh; background: var(--dedicated-bg); }
.dedicated-header { background: #000; position: sticky; top: 0; z-index: 100; padding: 8px 24px; display: flex; align-items: center; gap: 16px; }
.dedicated-back { display: inline-flex; align-items: center; gap: 6px; background: none; border: 1px solid #555; color: rgba(255,255,255,0.7); cursor: pointer; font-size: 13px; padding: 7px 14px; border-radius: 6px; font-family: inherit; transition: all .2s; text-decoration: none; }
.dedicated-back:hover { border-color: #888; color: #fff; }
.dedicated-title { font-size: 16px; font-weight: 600; color: #fff; }
.dedicated-body { padding: 0 24px 48px; }
.dedicated-body .graph-section { max-width: 1500px; }
.dedicated-body .gov-title { font-size: 24px; }
.dedicated-body .gov-subtitle { font-size: 16px; }
.dedicated-body .gov-summary { font-size: 16px; line-height: 1.65; }
.dedicated-body .gov-points li { font-size: 15px; line-height: 1.55; }
.dedicated-body .gov-btn { font-size: 15px; }

@media (max-width: 900px) {
    .graph-with-detail { flex-direction: column; }
    .graph-detail { width: 100%; border-left: none; border-top: 1px solid var(--canvas-border); max-height: none; }
    .license-panel { position: relative; top: auto; left: auto; width: 100%; max-height: none; margin-bottom: 12px; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.12); }
}
@media (max-width: 768px) {
    .hero h1 { font-size: 24px; }
    .article { padding: 0 16px; }
    .graph-section { padding: 0 16px; }
    .flow-body { flex-direction: column; }
    .flow-detail-panel { width: auto; border-left: none; border-top: 1px solid var(--flow-border); }
    .flow-tabs { flex-wrap: wrap; }
    .section-head { flex-direction: column; gap: 4px; }
    .section-nav-grid { grid-template-columns: 1fr; }
}
html[data-theme="dark"] body { background: #1a1a1a; color: #e0e0e0; }
html[data-theme="dark"] .article h2, html[data-theme="dark"] .article h3, html[data-theme="dark"] .section-head h2 { color: #e0e0e0; }
html[data-theme="dark"] .article p { color: #d0d0d0; }
html[data-theme="dark"] .article li { color: #d0d0d0; }
html[data-theme="dark"] .article a { color: #7eb8e0; }
html[data-theme="dark"] .article strong { color: #e0e0e0; }
html[data-theme="dark"] .article code { background: #2a2a2a; color: #d0d0d0; }
html[data-theme="dark"] .disclaimer, html[data-theme="dark"] .note { background: #1a2233; border-left-color: #3a6a9f; }
html[data-theme="dark"] .disclaimer p, html[data-theme="dark"] .note p { color: #d0d0d0; }
html[data-theme="dark"] .diagram-graph { box-shadow: 0 4px 24px rgba(0,0,0,0.4); }
html[data-theme="dark"] .section-block + .section-block { border-top-color: #333; }
html[data-theme="dark"] .section-num { color: #50E6FF; }

<script>
(function(){
  var saved = localStorage.getItem('entra-theme');
  var theme = saved || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', theme);
})();
function toggleTheme() {
  var html = document.documentElement;
  var current = html.getAttribute('data-theme') || 'light';
  var next = current === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('entra-theme', next);
  var icon = document.querySelector('.theme-toggle iconify-icon');
  if(icon) icon.setAttribute('icon', next === 'light' ? 'fluent:weather-moon-24-regular' : 'fluent:weather-sunny-24-regular');
}
</script>

/* 2-hop license discovery (3-hop for flow nodes): sel → neighbors → gov */
function govHiSet(sel,edges,D){
  const govIds=new Set();
  if(!sel)return govIds;
  if(sel.startsWith('gov_')&&D[sel]?.licensing){govIds.add(sel);return govIds}
  // 1st hop: direct gov connections
  const hop1=new Set();
  for(const e of edges){
    const other=e.source===sel?e.target:e.target===sel?e.source:null;
    if(!other)continue;
    if(other.startsWith('gov_')&&D[other]?.licensing)govIds.add(other);
    else if(!other.startsWith('res_'))hop1.add(other);
  }
  // 2nd hop: from non-gov neighbors, follow their gov edges
  for(const nid of hop1){
    for(const e of edges){
      const other=e.source===nid?e.target:e.target===nid?e.source:null;
      if(other&&other.startsWith('gov_')&&D[other]?.licensing)govIds.add(other);
    }
  }
  // 3rd hop for flow nodes: pattern → identity → gov
  if(sel.startsWith('flow_')){
    const newCore=new Set();
    for(const nid of hop1){
      for(const e of edges){
        const other=e.source===nid?e.target:e.target===nid?e.source:null;
        if(other&&!other.startsWith('gov_')&&!other.startsWith('res_')&&other!==sel&&!hop1.has(other))newCore.add(other);
      }
    }
    for(const nid of newCore){
      for(const e of edges){
        const other=e.source===nid?e.target:e.target===nid?e.source:null;
        if(other&&other.startsWith('gov_')&&D[other]?.licensing)govIds.add(other);
      }
    }
  }
  return govIds;
}
function hasLicensePanel(sel,edges,concepts){return govHiSet(sel,edges,concepts||C).size>0}
function LicensePanel({sel,edges,concepts}){const D=concepts||C;
  const govIds=govHiSet(sel,edges,D);
  if(govIds.size===0)return null;
  const items=[...govIds].map(id=>({id,...D[id]}));
  return html`<div className="license-panel">
    <h3><iconify-icon icon="fluent:certificate-24-regular" width="18" style=${{color:'#FF8C00'}}></iconify-icon> Licensing <span className="lp-badge">Recommended</span></h3>

function SeqDiagram({flow,step,onStep,dedicated}){

  const maxCols=6;const sc=dedicated?1.3:1;
  const colW=120*sc,pad=14*sc,boxW=100*sc,boxH=36*sc;
  const W=maxCols*colW+pad*2;
  const offset=(maxCols-pn)*colW/2;
  const cx=P.map((_,i)=>pad+offset+colW*i+colW/2);
  const topY=6;const lifeTop=topY+boxH;
  const stepStart=lifeTop+14*sc;
  const fixedBodyH=294*sc;
  const stepH=fixedBodyH/S.length;
  const bodyEnd=stepStart+fixedBodyH;
  const lifeBot=bodyEnd+14*sc;const botY=lifeBot+4*sc;const H=botY+boxH+8*sc;
  const boxFill=flow.accent||'#3a7bbf';const fs=dedicated?13:12;const sfs=dedicated?11:11.5;
  const lifeStroke=T.edgeStroke;const txtBright=T.nodeLabelSel;const txtDim=T.edgeLabel;const txtLabelDim=T.edgeLabel;const hiBg=getTheme()==='light'?'rgba(0,120,212,0.10)':'rgba(58,123,191,0.12)';

    return html`<g key=${i+'-'+y}>
      <rect x=${cx[i]-boxW/2} y=${y} width=${boxW} height=${boxH} rx=${3*sc} fill=${boxFill} stroke=${T.edgeStroke} strokeWidth=${1}/>
      ${ml?html`<text textAnchor="middle" fill="#fff" fontSize=${fs} fontWeight="600"><tspan x=${cx[i]} y=${y+boxH/2-4*sc}>${lines[0]}</tspan><tspan x=${cx[i]} y=${y+boxH/2+8*sc}>${lines[1]}</tspan></text>`
        :html`<text x=${cx[i]} y=${y+boxH/2+4*sc} textAnchor="middle" fill="#fff" fontSize=${fs} fontWeight="600">${p.label}</text>`}
    </g>`}
  return html`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style=${{width:'100%',maxWidth:W+'px'}}>
    ${P.map((p,i)=>pBox(p,i,topY))}
    ${cx.map((x,i)=>html`<line key=${'l'+i} x1=${x} y1=${lifeTop} x2=${x} y2=${lifeBot} stroke=${lifeStroke} strokeWidth="1"/>`)}
    ${S.map((s,i)=>{const y=stepStart+i*stepH+stepH/2;const x1=cx[s.f],x2=cx[s.t];const right=x2>x1;const ac=i===step;
      const col=ac?txtBright:txtDim;const sw=ac?2:1;
      const tipX=right?x2-6*sc:x2+6*sc;const pts=right?`${x2-7*sc},${y-4*sc} ${x2},${y} ${x2-7*sc},${y+4*sc}`:`${x2+7*sc},${y-4*sc} ${x2},${y} ${x2+7*sc},${y+4*sc}`;
      const midX=(x1+x2)/2;
      return html`<g key=${i} style=${{cursor:'pointer'}} onClick=${()=>onStep(i)}>
        ${ac&&html`<rect x=${Math.min(x1,x2)-3} y=${y-18*sc} width=${Math.abs(x2-x1)+6} height=${36*sc} rx=${3*sc} fill=${hiBg}/>`}
        <line x1=${x1} y1=${y} x2=${tipX} y2=${y} stroke=${col} strokeWidth=${sw}/>
        <polygon points=${pts} fill=${col}/>
        <text x=${midX} y=${y-6*sc} textAnchor="middle" fill=${ac?txtBright:txtLabelDim} fontSize=${sfs} fontWeight=${ac?'600':'400'}>${i+1}. ${s.label}</text>
      </g>`})}
    ${P.map((p,i)=>pBox(p,i,botY))}
  </svg>`}
