<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contosec Projects</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', -apple-system, sans-serif; background: #f5f5f5; color: #333; }
        .container { max-width: 720px; margin: 80px auto; padding: 0 24px; }
        h1 { font-size: 28px; font-weight: 600; margin-bottom: 8px; }
        .subtitle { color: #616161; margin-bottom: 40px; }
        .project { background: #fff; border: 1px solid #e5e5e5; border-radius: 8px; padding: 24px; margin-bottom: 16px; text-decoration: none; color: inherit; display: block; transition: box-shadow 0.2s; }
        .project:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .project h2 { font-size: 18px; margin-bottom: 6px; color: #1e304f; }
        .project p { font-size: 14px; color: #616161; }
        .footer { text-align: center; margin-top: 60px; font-size: 13px; color: #999; }
        @media (prefers-color-scheme: dark) {
            body { background: #1a1a1a; color: #e0e0e0; }
            .project { background: #252525; border-color: #333; }
            .project:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
            .project h2 { color: #7eb8e0; }
            .project p { color: #999; }
            .subtitle { color: #999; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Contosec Projects</h1>
        <p class="subtitle">Open-source security tools and utilities</p>

        <a href="/MDOAttackSimulation-PowerBI/" class="project">
            <h2>MDO Attack Simulation for Power BI</h2>
            <p>Azure Functions data pipeline that brings Microsoft Defender for Office 365 Attack Simulation Training data into Power BI for custom reporting and analytics.</p>
        </a>
    </div>
    <div class="footer">
        <p>Created by Carlos Suarez</p>
    </div>
</body>
</html>
